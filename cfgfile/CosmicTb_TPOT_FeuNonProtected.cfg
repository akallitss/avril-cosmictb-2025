#######################################
#-- Communication registers
# UdpChan_MultiPackThr = Eth_MTU - MaxSmpData - 60
# MaxSmpData = 2220 bytes
# Eth_Mtu depends on Eth NIC but is less 8kbytes
# E.g. for MTU 7k th parameter is 4888
#######################################
Feu * UdpChan_Enable 1
Feu * UdpChan_MultiPackEnb 1
#Feu * UdpChan_MultiPackEnb 0
Feu * UdpChan_MultiPackThr 4888

#######################################
#-- Communication registers
#######################################
Feu * ComChan_Enable 0

#######################################
#-- Auxiliary Trigger Onterface
# -- Configuration
#--   0  |  1  |   2  |
#--  ENC | DEC |Ignore|
Feu * TI_DcBal_Enc 0
Feu * TI_DcBal_Dec 0
Feu * TI_Ignore    0
Feu * TI_Bert      0

#######################################
# Dream registers
#######################################
# HitEnb / Thresh / Polarity / Peaking time
Feu * Dream *  1 0x081F 0xD053 0x0000 0x0000
Feu 1 Dream *  1 0x881F 0xD043 0x0000 0x0000
#Feu 1 Dream *  1 0x881F 0xD063 0x0000 0x0000
Feu 2 Dream *  1 0x881F 0xD043 0x0000 0x0000
# Hit Multiplicity
Feu * Dream *  2 0x0000 0x0008 0x0000 0x0000
# Pulser
Feu * Dream *  3 0x0000 0x0000 0x0000 0x0000
Feu * Dream *  4 0x0000 0x0000 0x0000 0x0000
# Gain: 100 fC
Feu * Dream *  6 0x5555 0x5555 0x5555 0x5555
Feu * Dream *  7 0x5555 0x5555 0x5555 0x5555
# Gain: 200 fC
#Feu * Dream *  6 0xAAAA 0xAAAA 0xAAAA 0xAAAA
#Feu * Dream *  7 0xAAAA 0xAAAA 0xAAAA 0xAAAA
# Gain: 600 fC
# Feu * Dream *  6 0xFFFF 0xFFFF 0xFFFF 0xFFFF 
# Feu * Dream *  7 0xFFFF 0xFFFF 0xFFFF 0xFFFF 

# Discriminator mask
Feu * Dream *  8 0xFFFF 0xFFFF 0x0000 0x0000
Feu * Dream *  9 0xFFFF 0xFFFF 0x0000 0x0000
# Latency
Feu * Dream * 12 0x002D 0x0000 0x0000 0x0000

#######################################
#-- Adc registers
#-- reg val flag
#-- flag: 0 - set internal register
#-- flag: 1 - set internal register 
#--       and tell ADC to take all
#--       set registers into account
#######################################
Feu * Adc 0x16 0x03 1

#######################################
#-- Dream Clock Parameters
#-- Div: Float value TrigClock / RdClk = 3.0, 4.0, 5.0, 6.0
#-- Phase: from 0 to 360 in steps of 45
#######################################
Feu * DrmClk RdClk_Div      6.0
Feu * DrmClk WrClk_Div      6.0
Feu * DrmClk WrClk_Phase    2
Feu * DrmClk AdcClk_Phase   5


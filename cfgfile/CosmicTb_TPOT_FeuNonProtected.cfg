# Format
# Configuration entries are organised in lines
# # - is comment line
# * - is wildcard, "Feu *", means all FEUs; "Dream *" means all Dreams 

#######################################
# SysName : MCube Answ 
#######################################
Sys Name        CosTb
Sys NbOfSamples 32

Sys DaqRun Trig         Ext     # Ext, Slf - Main use; Test: Cst, Exp
Sys DaqRun Rate         Low     # High; Low - Test: used only for Cst and Exp triggers 
Sys DaqRun Mode         Raw     # Raw, Ped, CMN, ZS 
Sys DaqRun Events       1000000       # 0 - Infinite
Sys DaqRun Time         0       # sec; 0 - Infinite
Sys DaqRun EndType      Stop    # Stop or Restart
Sys DaqRun Prescale     1       # 0 - no data - all prescaled
Sys DaqRun FileSize     1000    # 0 - no restriction (MB)

Sys PedRun Rate         Med    # High - run at maximum rate; Low - run at 100 Hz
Sys PedRun Trig         Exp    # Cst - constant; Exp - negative exponential
Sys PedRun Events       500   # Number of events for pedestal runs
Sys PedRun Threshold    5      # Number of sigma

#######################################
# Sys Action : 0-dono; 1-do
# PedThrRun do pedestal run
# TrgThrRun do trigger threshold run
# DataRun   take data
#######################################
Sys Action PedThrRun 1
Sys Action TrgThrRun 0
Sys Action DataRun   0

#######################################
# Topology : Feu ID [1 n] indicates TCM input
#            Dream ID [0-7] : Msk; Dat; Trg
#######################################
# Crate 1
# Sys Topo Feu  1 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat
# Sys Topo Feu  1 Dream      0 Trg      1 Trg      2 Trg      3 Trg      4 Trg      5 Trg      6 Trg      7 Trg
 Sys Topo Feu  5 Dream      0 Dat      1 Dat      2 Dat      3 Dat     4 Dat      5 Dat      6 Dat      7 Dat
# Sys Topo Feu  3 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat
# Sys Topo Feu  5 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Msk      5 Msk      6 Msk      7  Msk
# Sys Topo Feu  3 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat
# Sys Topo Feu  4 Dream      0 Msk      1 Msk      2 Msk      3 Msk      4 Msk      5 Msk      6 Msk      7 Msk
# Sys Topo Feu  5 Dream      0 Msk      1 Msk      2 Msk      3 Msk      4 Msk      5 Msk      6 Msk      7 Msk
# Sys Topo Feu  6 Dream      0 Msk      1 Msk      2 Msk      3 Msk      4 Msk      5 Msk      6 Msk      7 Msk
# Sys Topo Feu  7 Dream      0 Msk      1 Msk      2 Msk      3 Msk      4 Msk      5 Msk      6 Msk      7 Msk
# Sys Topo Feu  8 Dream      0 Msk      1 Msk      2 Msk      3 Msk      4 Msk      5 Msk      6 Msk      7 Msk
# Sys Topo Feu  9 Dream      0 Msk      1 Msk      2 Msk      3 Msk      4 Msk      5 Msk      6 Msk      7 Msk

#######################################
# Trigger multiplicity
######################################
 Sys Trg MultMoreThan 2
 Sys Trg MultLessThan 4

